services:
  nginx:
      restart: always
      container_name: nginx
      build:
        context: ./nginx
      networks:
        - music_room_network
      ports:
        - "8082:80"
        - "8443:443"
      depends_on:
        - backend
        - redis
        - adminer
      volumes:
        - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - music_room_network
    environment:
      - POSTGRES_DB=music_room
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - music_room_network
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: build/Dockerfile
    command: sh /app/start.sh
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - music_room_network
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=True
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  adminer:
    image: adminer
    restart: always
    networks:
      - music_room_network
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:

networks:
  music_room_network:
    driver: bridge